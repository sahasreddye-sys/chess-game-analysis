name: Deploy to GitHub Pages

# Builds the static export and publishes it to GitHub Pages on every push to
# main. The Stockfish engine binaries are copied from node_modules by the
# package's postinstall script during `npm ci`, so they end up in `out/` — no
# need to commit the 40 MB net to the repo.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static export
        run: npm run build
        env:
          # Serve from the project sub-path (https://<user>.github.io/<repo>/).
          BASE_PATH: /chess-game-analysis
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
